[build]
  command = "npm run build"
  publish = "dist"

# Proxy /api/* sang Azure backend
[[redirects]]
  from = "/api/*"
  to = "https://bantru-nodejs-fkhde9htaae7h5fm.southeastasia-01.azurewebsites.net/api/:splat"
  status = 200
  force = true

# Proxy /login/ và /logout/ sang Azure backend
[[redirects]]
  from = "/login/"
  to = "https://bantru-nodejs-fkhde9htaae7h5fm.southeastasia-01.azurewebsites.net/login/"
  status = 200
  force = true

[[redirects]]
  from = "/logout/"
  to = "https://bantru-nodejs-fkhde9htaae7h5fm.southeastasia-01.azurewebsites.net/logout/"
  status = 200
  force = true

# SPA fallback - phải để cuối cùng
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
